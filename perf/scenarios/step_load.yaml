suite: 苍穹外卖-阶梯加压测试
base_url: "http://zombieai.cn:8080"

config:
  type: step_load
  stages:
    - users: 10
      run_time: 20s
      spawn_rate: 5
    - users: 20
      run_time: 20s
      spawn_rate: 10
    - users: 50
      run_time: 20s
      spawn_rate: 15
    - users: 100
      run_time: 20s
      spawn_rate: 20
    - users: 200
      run_time: 20s
      spawn_rate: 25

login:
  enabled: true
  method: POST
  path: /admin/employee/login
  headers:
    Content-Type: application/json
  body:
    username: "admin"
    password: "123456"
  token_field: "data.token"

scenarios:
  - name: 员工登录
    weight: 3
    use_login: false
    tasks:
      - name: 员工登录
        method: POST
        path: /admin/employee/login
        headers:
          Content-Type: application/json
        body:
          username: "admin"
          password: "123456"

  - name: 分类查询
    weight: 5
    tasks:
      - name: 查询分类列表
        method: GET
        path: /admin/category/list

  - name: 菜品查询
    weight: 5
    tasks:
      - name: 菜品分页查询
        method: GET
        path: /admin/dish/page
        params:
          page: 1
          pageSize: 10

  - name: 订单查询
    weight: 3
    tasks:
      - name: 订单搜索
        method: GET
        path: /admin/order/conditionSearch
        params:
          page: 1
          pageSize: 10

  - name: 套餐查询
    weight: 4
    tasks:
      - name: 套餐分页查询
        method: GET
        path: /admin/setmeal/page
        params:
          page: 1
          pageSize: 10
