suite: 菜品管理模块
base_url: '{{base_url}}'
cases:
- name: 新增菜品_正常流程_必填字段完整
  priority: P0
  request:
    method: POST
    path: /admin/dish
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      categoryId: 1
      name: 宫保鸡丁
      price: 3800
      image: /images/dish/gongbaojiding.jpg
      description: 经典川菜
      status: 1
      flavors:
      - name: 辣度
        value: 微辣
      - name: 温度
        value: 正常
  assert:
    status_code: 200
    json:
      code: 1
      msg: 操作成功
  db_check:
  - sql: SELECT * FROM dish WHERE name = '宫保鸡丁' AND is_deleted = 0
    expect_not_empty: true
  - sql: SELECT status FROM dish WHERE name = '宫保鸡丁' AND is_deleted = 0
    expect_value: 1
- name: 新增菜品_异常_名称为空
  priority: P1
  request:
    method: POST
    path: /admin/dish
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      categoryId: 1
      name: ''
      price: 3800
      image: /images/dish/test.jpg
      description: 测试菜品
  assert:
    status_code: 200
    json:
      code: 0
      msg: ''
  db_check:
  - sql: SELECT * FROM dish WHERE name = '' AND is_deleted = 0
    expect_empty: true
- name: 新增菜品_异常_未登录
  priority: P1
  request:
    method: POST
    path: /admin/dish
    headers:
      Content-Type: application/json
    body:
      categoryId: 1
      name: 宫保鸡丁
      price: 3800
      image: /images/dish/test.jpg
      description: 经典川菜
  assert:
    status_code: 401
  db_check:
  - sql: SELECT * FROM dish WHERE name = '宫保鸡丁' AND is_deleted = 0
    expect_empty: true
- name: 新增菜品_异常_价格为负数
  priority: P1
  request:
    method: POST
    path: /admin/dish
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      categoryId: 1
      name: 宫保鸡丁
      price: -100
      image: /images/dish/test.jpg
      description: 经典川菜
  assert:
    status_code: 200
    json:
      code: 0
      msg: ''
  db_check:
  - sql: SELECT * FROM dish WHERE name = '宫保鸡丁' AND price < 0 AND is_deleted = 0
    expect_empty: true
- name: 修改菜品_正常流程_修改名称和价格
  priority: P0
  request:
    method: POST
    path: /admin/dish
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      categoryId: 1
      name: 宫保鸡丁_待修改
      price: 3800
      image: /images/dish/test.jpg
      description: 测试菜品
  assert:
    status_code: 200
    json:
      code: 1
  extract:
    dish_id: $.data
  save_as: setup_dish_id_1
- name: 修改菜品_正常流程_执行修改
  priority: P0
  depends_on: save_dish_id_1
  request:
    method: PUT
    path: /admin/dish
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      id: '{{setup_dish_id_1}}'
      categoryId: 1
      name: 宫保鸡丁_已修改
      price: 4200
      image: /images/dish/updated.jpg
      description: 修改后的菜品
      status: 1
  assert:
    status_code: 200
    json:
      code: 1
      msg: 操作成功
  db_check:
  - sql: SELECT name, price FROM dish WHERE id = {{setup_dish_id_1}} AND is_deleted
      = 0
    expect_not_empty: true
- name: 修改菜品_异常_菜品不存在
  priority: P1
  request:
    method: PUT
    path: /admin/dish
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      id: 999999
      categoryId: 1
      name: 不存在的菜品
      price: 3800
      image: /images/dish/test.jpg
      description: 测试
  assert:
    status_code: 200
    json:
      code: 0
- name: 修改菜品_异常_未登录
  priority: P1
  request:
    method: PUT
    path: /admin/dish
    headers:
      Content-Type: application/json
    body:
      id: 1
      categoryId: 1
      name: 宫保鸡丁
      price: 3800
      image: /images/dish/test.jpg
      description: 测试
  assert:
    status_code: 401
- name: 修改菜品_边界_名称最大长度
  priority: P2
  depends_on: save_dish_id_1
  request:
    method: PUT
    path: /admin/dish
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      id: '{{setup_dish_id_1}}'
      categoryId: 1
      name: 菜品名称测试最大长度验证菜品名称测试最大长度验证菜品名称测试最大长度验证菜品名称测试最大长度验证菜品名称测试最大长度验证菜品名称测试最大长度验证
      price: 3800
      image: /images/dish/test.jpg
      description: 边界测试
      status: 1
  assert:
    status_code: 200
- name: 批量删除菜品_正常流程_删除单个菜品
  priority: P0
  request:
    method: POST
    path: /admin/dish
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      categoryId: 1
      name: 待删除菜品A
      price: 1000
      image: /images/dish/delete_a.jpg
      description: 用于删除测试
  assert:
    status_code: 200
    json:
      code: 1
  extract:
    delete_dish_id: $.data
  save_as: delete_dish_id_a
- name: 批量删除菜品_正常流程_执行删除
  priority: P0
  depends_on: save_delete_dish_id_a
  request:
    method: DELETE
    path: /admin/dish?ids={{delete_dish_id_a}}
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
      msg: 操作成功
  db_check:
  - sql: SELECT * FROM dish WHERE id = {{delete_dish_id_a}} AND is_deleted = 0
    expect_empty: true
- name: 批量删除菜品_正常流程_删除多个菜品
  priority: P0
  setup:
  - api: POST /admin/dish
    body:
      categoryId: 1
      name: 批量删除菜品B
      price: 1000
      image: /images/dish/b.jpg
      description: 批量删除测试
    token: '{{admin_token}}'
    extract:
      multi_id_1: $.data
  - api: POST /admin/dish
    body:
      categoryId: 1
      name: 批量删除菜品C
      price: 1000
      image: /images/dish/c.jpg
      description: 批量删除测试
    token: '{{admin_token}}'
    extract:
      multi_id_2: $.data
  request:
    method: DELETE
    path: /admin/dish?ids={{multi_id_1}}&ids={{multi_id_2}}
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
      msg: 操作成功
  db_check:
  - sql: SELECT * FROM dish WHERE id IN ({{multi_id_1}}, {{multi_id_2}}) AND is_deleted
      = 0
    expect_empty: true
- name: 批量删除菜品_异常_未登录
  priority: P1
  request:
    method: DELETE
    path: /admin/dish?ids=1
    headers:
      Content-Type: application/json
  assert:
    status_code: 401
- name: 批量删除菜品_异常_ids为空
  priority: P1
  request:
    method: DELETE
    path: /admin/dish
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 0
- name: 查询菜品列表_正常流程_按分类查询
  priority: P0
  request:
    method: GET
    path: /admin/dish/list?categoryId=1
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 查询菜品列表_正常流程_不传分类查询全部
  priority: P0
  request:
    method: GET
    path: /admin/dish/list
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 查询菜品列表_异常_未登录
  priority: P1
  request:
    method: GET
    path: /admin/dish/list?categoryId=1
  assert:
    status_code: 401
- name: 查询菜品列表_边界_不存在的分类id
  priority: P2
  request:
    method: GET
    path: /admin/dish/list?categoryId=999999
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 菜品分页查询_正常流程_默认分页
  priority: P0
  request:
    method: GET
    path: /admin/dish/page?page=1&pageSize=10
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 菜品分页查询_正常流程_按名称搜索
  priority: P0
  request:
    method: GET
    path: /admin/dish/page?page=1&pageSize=10&name=宫保
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 菜品分页查询_正常流程_按状态筛选
  priority: P1
  request:
    method: GET
    path: /admin/dish/page?page=1&pageSize=10&status=1
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 菜品分页查询_正常流程_按分类筛选
  priority: P1
  request:
    method: GET
    path: /admin/dish/page?page=1&pageSize=10&categoryId=1
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 菜品分页查询_正常流程_组合条件查询
  priority: P1
  request:
    method: GET
    path: /admin/dish/page?page=1&pageSize=10&name=鸡&categoryId=1&status=1
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 菜品分页查询_异常_未登录
  priority: P1
  request:
    method: GET
    path: /admin/dish/page?page=1&pageSize=10
  assert:
    status_code: 401
- name: 菜品分页查询_边界_pageSize为0
  priority: P2
  request:
    method: GET
    path: /admin/dish/page?page=1&pageSize=0
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
- name: 菜品分页查询_边界_超大page页码
  priority: P2
  request:
    method: GET
    path: /admin/dish/page?page=99999&pageSize=10
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 菜品起售_正常流程_停售改起售
  priority: P0
  setup:
  - api: POST /admin/dish
    body:
      categoryId: 1
      name: 起售测试菜品
      price: 2000
      image: /images/dish/status_a.jpg
      description: 起售测试
      status: 0
    token: '{{admin_token}}'
    extract:
      status_dish_id: $.data
  request:
    method: POST
    path: /admin/dish/status/1?id={{status_dish_id}}
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
      msg: 操作成功
  db_check:
  - sql: SELECT status FROM dish WHERE id = {{status_dish_id}}
    expect_value: 1
- name: 菜品停售_正常流程_起售改停售
  priority: P0
  setup:
  - api: POST /admin/dish
    body:
      categoryId: 1
      name: 停售测试菜品
      price: 2000
      image: /images/dish/status_b.jpg
      description: 停售测试
      status: 1
    token: '{{admin_token}}'
    extract:
      stop_dish_id: $.data
  request:
    method: POST
    path: /admin/dish/status/0?id={{stop_dish_id}}
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
      msg: 操作成功
  db_check:
  - sql: SELECT status FROM dish WHERE id = {{stop_dish_id}}
    expect_value: 0
- name: 菜品起售_异常_未登录
  priority: P1
  request:
    method: POST
    path: /admin/dish/status/1?id=1
    headers:
      Content-Type: application/json
  assert:
    status_code: 401
- name: 菜品起售_异常_菜品不存在
  priority: P1
  request:
    method: POST
    path: /admin/dish/status/1?id=999999
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 0
- name: 菜品停售_异常_未传id参数
  priority: P2
  request:
    method: POST
    path: /admin/dish/status/0
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 0
- name: 根据id查询菜品_正常流程_查询已存在的菜品
  priority: P0
  setup:
  - api: POST /admin/dish
    body:
      categoryId: 1
      name: 查询测试菜品
      price: 2500
      image: /images/dish/get_a.jpg
      description: 查询测试
      status: 1
      flavors:
      - name: 辣度
        value: 中辣
    token: '{{admin_token}}'
    extract:
      query_dish_id: $.data
  request:
    method: GET
    path: /admin/dish/{{query_dish_id}}
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 根据id查询菜品_正常流程_验证返回数据一致性
  priority: P0
  setup:
  - api: POST /admin/dish
    body:
      categoryId: 1
      name: 验证数据一致性菜品
      price: 3000
      image: /images/dish/get_b.jpg
      description: 验证数据一致性
      status: 1
      flavors:
      - name: 辣度
        value: 微辣
    token: '{{admin_token}}'
    extract:
      verify_dish_id: $.data
  request:
    method: GET
    path: /admin/dish/{{verify_dish_id}}
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT name, price, category_id FROM dish WHERE id = {{verify_dish_id}}
    expect_not_empty: true
- name: 根据id查询菜品_异常_菜品不存在
  priority: P1
  request:
    method: GET
    path: /admin/dish/999999
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 0
- name: 根据id查询菜品_异常_未登录
  priority: P1
  request:
    method: GET
    path: /admin/dish/1
  assert:
    status_code: 401
- name: 根据id查询菜品_边界_id为0
  priority: P2
  request:
    method: GET
    path: /admin/dish/0
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
- name: 根据id查询菜品_边界_id为负数
  priority: P2
  request:
    method: GET
    path: /admin/dish/-1
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
