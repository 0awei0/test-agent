- name: 微信登录_重复登录_相同用户再次登录
  priority: P2
  marker: regression
  depends_on: 环境健康检查_服务是否可用
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: '{{valid_wechat_code}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT COUNT(*) as cnt FROM user WHERE openid IS NOT NULL
    expect_count: 1
    message: 重复登录不应创建重复用户
- name: 微信登录_并发登录_同一授权码同时请求
