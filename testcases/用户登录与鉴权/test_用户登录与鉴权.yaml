      $.data.id: NOT_NULL
      $.data.name: NOT_NULL
- name: 微信登录_登录后Token有效性_可正常访问需认证接口
  priority: P1
  marker: regression
  depends_on: 环境健康检查_服务是否可用
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: '{{valid_wechat_code}}'
  assert:
    status_code: 200
    json:
      code: 1
  downstream:
  - name: 使用token访问购物车列表
    request:
      method: GET
      path: /user/shoppingCart/list
      headers:
        token: '{{user_token}}'
    assert:
      status_code: 200
      json:
        code: 1
