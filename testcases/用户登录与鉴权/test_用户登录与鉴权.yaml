- name: 退出登录_退出后Token失效_使用已退出的token访问需认证接口
  priority: P1
  marker: regression
  depends_on: 环境健康检查_服务是否可用
  steps:
  - step: 1_退出登录
    request:
      method: POST
      path: /user/user/logout
      headers:
        Content-Type: application/json
        token: '{{user_token}}'
    assert:
      status_code: 200
      json:
        code: 1
  - step: 2_使用退出后的token访问购物车列表
    request:
      method: GET
      path: /user/shoppingCart/list
      headers:
        Content-Type: application/json
        token: '{{user_token}}'
    assert:
      status_code: 200
      json:
        code: 0
