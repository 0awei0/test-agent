    headers:
      Content-Type: application/json
    body:
      code: '{{concurrent_wechat_code}}'
  assert:
    status_code: 200
    json:
      code: 1
  note: 需配合并发脚本验证，防止重复创建用户
- name: 微信登录_响应结构_返回token字段
