suite: 用户登录与鉴权模块
base_url: '{{base_url}}'
cases:
- name: 环境健康检查_服务是否可用
  priority: P0
  marker: smoke
  request:
    method: GET
    path: /user/shop/status
    headers:
      Content-Type: application/json
  assert:
    status_code: 200
    json:
      code: 1
  note: 用于验证测试环境API服务是否正常运行，所有后续用例应在此用例通过后执行
- name: 微信登录_正常流程_有效授权码
  priority: P0
  marker: smoke
  depends_on: 环境健康检查_服务是否可用
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: '{{valid_wechat_code}}'
  assert:
    status_code: 200
    json:
      code: 1
    jsonpath:
      $.data.id: NOT_NULL
      $.data.name: NOT_NULL
      $.data.token: NOT_NULL
  db_check:
  - sql: SELECT * FROM user WHERE openid IS NOT NULL ORDER BY create_time DESC LIMIT
      1
    expect_not_empty: true
- name: 微信登录_参数校验_code字段为空字符串
  priority: P1
  marker: regression
  depends_on: 环境健康检查_服务是否可用
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: ''
  assert:
    status_code: 200
    json:
      code: 0
      msg: code不能为空
