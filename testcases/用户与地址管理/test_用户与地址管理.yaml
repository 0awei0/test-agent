suite: 用户与地址管理模块
base_url: '{{base_url}}'
cases:
- name: 微信登录_正常流程
  priority: P0
  marker: smoke
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: '{{valid_wx_code}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 微信登录_code为空
  priority: P1
  marker: regression
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: ''
  assert:
    status_code: 200
    json:
      code: 0
- name: 微信登录_code字段缺失
  priority: P1
  marker: regression
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body: {}
  assert:
    status_code: 200
    json:
      code: 0
- name: 微信登录_code为无效值
  priority: P1
  marker: regression
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: invalid_code_12345
  assert:
    status_code: 200
    json:
      code: 0
- name: 微信登录_code超长字符串
  priority: P2
  marker: regression
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
  assert:
    status_code: 200
    json:
      code: 0
- name: 微信登录_code包含特殊字符
  priority: P2
  marker: regression
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: '!@#$%^&*()'
  assert:
    status_code: 200
    json:
      code: 0
- name: 微信登录_code为SQL注入尝试
  priority: P2
  marker: security
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: 1' OR '1'='1
  assert:
    status_code: 200
    json:
      code: 0
- name: 微信登录_重复登录
  priority: P1
  marker: regression
  request:
    method: POST
    path: /user/user/login
    headers:
      Content-Type: application/json
    body:
      code: '{{valid_wx_code}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 退出登录_正常流程
  priority: P0
  marker: smoke
  request:
    method: POST
    path: /user/user/logout
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 退出登录_未登录状态
  priority: P1
  marker: regression
  request:
    method: POST
    path: /user/user/logout
    headers:
      Content-Type: application/json
  assert:
    status_code: 401
- name: 退出登录_token无效
  priority: P1
  marker: regression
  request:
    method: POST
    path: /user/user/logout
    headers:
      Content-Type: application/json
      authentication: invalid_token_12345
  assert:
    status_code: 200
    json:
      code: 0
- name: 退出登录_token为空字符串
  priority: P1
  marker: regression
  request:
    method: POST
    path: /user/user/logout
    headers:
      Content-Type: application/json
      authentication: ''
  assert:
    status_code: 200
    json:
      code: 0
- name: 退出登录_重复退出
  priority: P2
  marker: regression
  request:
    method: POST
    path: /user/user/logout
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 新增地址_正常流程_完整参数
  priority: P0
  marker: smoke
  request:
    method: POST
    path: /user/addressBook
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
    body:
      consignee: 张三
      phone: '13800138000'
      sex: 男
      provinceCode: '110000'
      provinceName: 北京市
      cityCode: '110100'
      cityName: 北京市
      districtCode: '110101'
      districtName: 东城区
      detail: 天安门广场1号
      label: 公司
      isDefault: 0
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM address_book WHERE consignee = '张三' AND phone = '13800138000'
    expect_not_empty: true
- name: 新增地址_正常流程_设为默认地址
  priority: P0
