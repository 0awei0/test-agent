    method: POST
    path: /user/addressBook
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
    body:
      consignee: 李四
      phone: '13900139000'
      sex: 女
      provinceCode: '310000'
      provinceName: 上海市
      cityCode: '310100'
      cityName: 上海市
      districtCode: '310101'
      districtName: 黄浦区
      detail: 南京路步行街100号
      label: 家
      isDefault: 1
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM address_book WHERE is_default = 1 AND user_id = {{user_id}}
    expect_count: 1
