suite: 工作台模块
base_url: '{{base_url}}'
cases:
- name: businessData_正常流程
  priority: P0
  request:
    method: GET
    path: /admin/workspace/businessData
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT COUNT(*) FROM order WHERE status IN (2,3,4,5) AND DATE(create_time)
      = CURDATE()
    expect_column: 今日订单数
- name: businessData_未登录
  priority: P1
  request:
    method: GET
    path: /admin/workspace/businessData
  assert:
    status_code: 401
- name: businessData_token无效
  priority: P1
  request:
    method: GET
    path: /admin/workspace/businessData
    headers:
      token: invalid_token_12345
  assert:
    status_code: 200
    json:
      code: 0
      msg: NOT_LOGIN
