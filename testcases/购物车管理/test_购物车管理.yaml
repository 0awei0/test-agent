suite: 购物车管理模块
base_url: '{{base_url}}'
cases:
- name: 添加购物车_添加菜品_正常流程
  priority: P0
  request:
    method: POST
    path: /user/shoppingCart/add
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
    body:
      dishId: 46
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM shopping_cart WHERE user_id = {{user_id}} AND dish_id = 1
    expect_not_empty: true
- name: 添加购物车_添加套餐_正常流程
  priority: P0
  request:
    method: POST
    path: /user/shoppingCart/add
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
    body:
      setmealId: 32
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM shopping_cart WHERE user_id = {{user_id}} AND setmeal_id =
      1
    expect_not_empty: true
- name: 添加购物车_未登录
  priority: P1
  request:
    method: POST
    path: /user/shoppingCart/add
    headers:
      Content-Type: application/json
    body:
      dishId: 46
  assert:
    status_code: 401
- name: 移出购物车_减少菜品数量_正常流程
  priority: P0
  request:
    method: POST
    path: /user/shoppingCart/sub
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
    body:
      dishId: 46
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT number FROM shopping_cart WHERE user_id = {{user_id}} AND dish_id
      = 1
    expect_columns:
      number: 1
- name: 移出购物车_未登录
  priority: P1
  request:
    method: POST
    path: /user/shoppingCart/sub
    headers:
      Content-Type: application/json
    body:
      dishId: 46
  assert:
    status_code: 401
- name: 查看购物车_有商品_正常流程
  priority: P0
  request:
    method: GET
    path: /user/shoppingCart/list
    headers:
      authentication: '{{user_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM shopping_cart WHERE user_id = {{user_id}}
    expect_not_empty: true
- name: 查看购物车_空购物车_返回空列表
  priority: P0
  request:
    method: GET
    path: /user/shoppingCart/list
    headers:
      authentication: '{{user_token}}'
  assert:
    status_code: 200
    json:
      code: 1
      data: []
- name: 查看购物车_未登录
  priority: P1
  request:
    method: GET
    path: /user/shoppingCart/list
    headers: {}
  assert:
    status_code: 401
- name: 清空购物车_正常流程
  priority: P0
  request:
    method: DELETE
    path: /user/shoppingCart/clean
    headers:
      authentication: '{{user_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM shopping_cart WHERE user_id = {{user_id}}
    expect_empty: true
- name: 清空购物车_未登录
  priority: P1
  request:
    method: DELETE
    path: /user/shoppingCart/clean
    headers: {}
  assert:
    status_code: 401
- name: 清空购物车_购物车已空时再清空
  priority: P2
  request:
    method: DELETE
    path: /user/shoppingCart/clean
    headers:
      authentication: '{{user_token}}'
  assert:
    status_code: 200
    json:
      code: 1
