suite: 套餐管理模块
base_url: '{{base_url}}'
cases:
- name: 新增套餐_正常流程
  priority: P0
  request:
    method: POST
    path: /admin/setmeal
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      categoryId: 1
      name: 商务双人套餐
      price: 3800
      image: http://example.com/setmeal.jpg
      description: 包含两份主食和两杯饮料
      status: 0
      setmealDishes:
      - dishId: 1
        name: 宫保鸡丁
        price: 2000
        copies: 2
      - dishId: 2
        name: 米饭
        price: 200
        copies: 2
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM setmeal WHERE name = '商务双人套餐' AND is_deleted = 0
    expect_not_empty: true
  - sql: SELECT * FROM setmeal_dish WHERE setmeal_id = (SELECT id FROM setmeal WHERE
      name = '商务双人套餐' LIMIT 1)
    expect_not_empty: true
- name: 新增套餐_名称为空
  priority: P1
  request:
    method: POST
    path: /admin/setmeal
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      categoryId: 1
      name: ''
      price: 3800
      image: http://example.com/setmeal.jpg
      setmealDishes:
      - dishId: 1
        name: 宫保鸡丁
        price: 2000
        copies: 2
  assert:
    status_code: 200
    json:
      code: 0
- name: 新增套餐_未登录
  priority: P0
  request:
    method: POST
    path: /admin/setmeal
    headers:
      Content-Type: application/json
    body:
      categoryId: 1
      name: 测试套餐
      price: 1000
      image: http://example.com/test.jpg
      setmealDishes:
      - dishId: 1
        name: 宫保鸡丁
        price: 2000
        copies: 1
  assert:
    status_code: 401
- name: 修改套餐_正常流程
  priority: P0
  request:
    method: PUT
    path: /admin/setmeal
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      id: 1
      categoryId: 1
      name: 商务双人套餐（修改后）
      price: 4500
      image: http://example.com/setmeal_new.jpg
      description: 修改后的套餐描述
      status: 1
      setmealDishes:
      - dishId: 1
        name: 宫保鸡丁
        price: 2000
        copies: 2
      - dishId: 3
        name: 可乐
        price: 500
        copies: 2
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM setmeal WHERE id = 1 AND name = '商务双人套餐（修改后）' AND price = 4500
    expect_not_empty: true
- name: 修改套餐_名称为空
  priority: P1
  request:
    method: PUT
    path: /admin/setmeal
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      id: 1
      categoryId: 1
      name: ''
      price: 3800
      image: http://example.com/setmeal.jpg
      setmealDishes:
      - dishId: 1
        name: 宫保鸡丁
        price: 2000
        copies: 2
  assert:
    status_code: 200
    json:
      code: 0
- name: 修改套餐_未登录
  priority: P0
  request:
    method: PUT
    path: /admin/setmeal
    headers:
      Content-Type: application/json
    body:
      id: 1
      categoryId: 1
      name: 测试修改
      price: 1000
      image: http://example.com/test.jpg
      setmealDishes:
      - dishId: 1
        name: 宫保鸡丁
        price: 2000
        copies: 1
  assert:
    status_code: 401
- name: 删除套餐_正常流程
  priority: P0
  request:
    method: DELETE
    path: /admin/setmeal?ids=101
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM setmeal WHERE id = 101 AND is_deleted = 0
    expect_empty: true
  - sql: SELECT * FROM setmeal WHERE id = 101 AND is_deleted = 1
    expect_not_empty: true
- name: 删除套餐_未登录
  priority: P0
  request:
    method: DELETE
    path: /admin/setmeal?ids=102
    headers:
      Content-Type: application/json
  assert:
    status_code: 401
- name: 分页查询套餐_正常流程
  priority: P0
  request:
    method: GET
    path: /admin/setmeal/page?page=1&pageSize=10
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT COUNT(*) FROM setmeal WHERE is_deleted = 0
    expect_not_empty: true
- name: 分页查询套餐_按名称筛选
  priority: P1
  request:
    method: GET
    path: /admin/setmeal/page?page=1&pageSize=10&name=商务
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 分页查询套餐_按分类筛选
  priority: P1
  request:
    method: GET
    path: /admin/setmeal/page?page=1&pageSize=10&categoryId=1
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 分页查询套餐_按状态筛选
  priority: P1
  request:
    method: GET
    path: /admin/setmeal/page?page=1&pageSize=10&status=1
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 分页查询套餐_未登录
  priority: P0
  request:
    method: GET
    path: /admin/setmeal/page?page=1&pageSize=10
    headers:
      Content-Type: application/json
  assert:
    status_code: 401
- name: 启售套餐_正常流程
  priority: P0
  request:
    method: POST
    path: /admin/setmeal/status/1?id=1
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM setmeal WHERE id = 1 AND status = 1
    expect_not_empty: true
- name: 停售套餐_正常流程
  priority: P0
  request:
    method: POST
    path: /admin/setmeal/status/0?id=1
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM setmeal WHERE id = 1 AND status = 0
    expect_not_empty: true
- name: 起售停售套餐_未登录
  priority: P0
  request:
    method: POST
    path: /admin/setmeal/status/1?id=1
    headers:
      Content-Type: application/json
  assert:
    status_code: 401
- name: 根据ID查询套餐_正常流程
  priority: P0
  request:
    method: GET
    path: /admin/setmeal/1
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM setmeal WHERE id = 1
    expect_not_empty: true
- name: 根据ID查询套餐_不存在的ID
  priority: P1
  request:
    method: GET
    path: /admin/setmeal/99999
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 0
- name: 根据ID查询套餐_未登录
  priority: P0
  request:
    method: GET
    path: /admin/setmeal/1
    headers:
      Content-Type: application/json
  assert:
    status_code: 401
