suite: 商品浏览模块
base_url: "{{base_url}}"
cases:
  - name: 查询分类_成功获取所有分类
    priority: P0
    marker: smoke
    request:
      method: GET
      path: /user/category/list
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 1
        data: "{{notNull}}"
        message: "success"

  - name: 查询分类_使用POST方法请求_返回404
    priority: P1
    marker: regression
    request:
      method: POST
      path: /user/category/list
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 404

  - name: 查询分类_无Token访问_返回401
    priority: P2
    marker: regression
    request:
      method: GET
      path: /user/category/list
      headers:
        Content-Type: application/json
    assert:
      status_code: 401
      json:
        code: 0
        message: "未登录"

  - name: 查询菜品列表_成功获取默认分页数据
    priority: P0
    marker: smoke
    request:
      method: GET
      path: /user/dish/list
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 1
        data:
          records: "{{notNull}}"
          total: "{{greaterThan(0)}}"
          pages: "{{greaterThan(0)}}"

  - name: 查询菜品列表_按分类ID筛选
    priority: P1
    marker: regression
    request:
      method: GET
      path: /user/dish/list?categoryId=1&page=1&pageSize=5
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 1
        data:
          records: "{{notNull}}"
          current: 1
          size: 5

  - name: 查询菜品列表_分页参数为负数_返回错误或默认页
    priority: P2
    marker: regression
    request:
      method: GET
      path: /user/dish/list?page=-1&pageSize=10
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 1
        data:
          current: "{{greaterThanOrEqual(1)}}"
          size: 10

  - name: 查询套餐列表_根据分类ID成功查询
    priority: P0
    marker: smoke
    request:
      method: GET
      path: /user/setmeal/list?categoryId=1
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 1
        data: "{{notNull}}"

  - name: 查询套餐列表_分类ID不存在_返回空列表
    priority: P1
    marker: regression
    request:
      method: GET
      path: /user/setmeal/list?categoryId=999999
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 1
        data: "[]"

  - name: 查询套餐列表_分类ID参数类型错误_返回错误或默认查询
    priority: P2
    marker: regression
    request:
      method: GET
      path: /user/setmeal/list?categoryId=abc
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 1
        data: "{{notNull}}"

  - name: 查询套餐菜品列表_成功获取套餐内菜品
    priority: P0
    marker: smoke
    request:
      method: GET
      path: /user/setmeal/dish/1
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 1
        data: "{{notNull}}"

  - name: 查询套餐菜品列表_套餐ID不存在_返回错误
    priority: P1
    marker: regression
    request:
      method: GET
      path: /user/setmeal/dish/999999
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 0
        message: "套餐不存在"

  - name: 查询套餐菜品列表_套餐ID为非数字_返回错误
    priority: P2
    marker: regression
    request:
      method: GET
      path: /user/setmeal/dish/abc
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 200
      json:
        code: 0
        message: "无效的套餐ID"