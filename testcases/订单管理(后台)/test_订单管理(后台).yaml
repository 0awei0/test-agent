      code: 1
  db_check:
  - sql: SELECT status FROM orders WHERE id = 5
    expect_value:
      status: 5
- name: 取消订单_不存在的订单ID
  priority: P1
  request:
    method: PUT
    path: /admin/order/cancel
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      id: 999999
      cancelReason: 客户主动取消
  assert:
