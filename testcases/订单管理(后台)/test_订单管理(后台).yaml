    json:
      code: 0
- name: 取消订单_未登录
  priority: P1
  request:
    method: PUT
    path: /admin/order/cancel
    headers:
      Content-Type: application/json
    body:
      id: 5
      cancelReason: 客户主动取消
  assert:
    status_code: 401
- name: 条件搜索_全部查询
  priority: P0
  request:
    method: GET
    path: /admin/order/conditionSearch
    headers:
      token: '{{admin_token}}'
    query:
      page: 1
      pageSize: 10
  assert:
    status_code: 200
    json:
      code: 1
- name: 条件搜索_按订单号搜索
  priority: P0
  request:
    method: GET
    path: /admin/order/conditionSearch
    headers:
      token: '{{admin_token}}'
    query:
      number: '20240101001'
      page: 1
      pageSize: 10
  assert:
    status_code: 200
    json:
      code: 1
- name: 条件搜索_按手机号搜索
  priority: P1
  request:
    method: GET
    path: /admin/order/conditionSearch
    headers:
      token: '{{admin_token}}'
    query:
      phone: '13800138000'
      page: 1
      pageSize: 10
  assert:
    status_code: 200
    json:
      code: 1
- name: 条件搜索_按订单状态搜索
  priority: P1
  request:
    method: GET
    path: /admin/order/conditionSearch
    headers:
      token: '{{admin_token}}'
    query:
      status: 2
      page: 1
      pageSize: 10
  assert:
    status_code: 200
    json:
      code: 1
- name: 条件搜索_按时间范围搜索
  priority: P1
  request:
    method: GET
    path: /admin/order/conditionSearch
    headers:
      token: '{{admin_token}}'
    query:
      beginTime: '2024-01-01 00:00:00'
      endTime: '2024-12-31 23:59:59'
      page: 1
      pageSize: 10
  assert:
    status_code: 200
    json:
      code: 1
- name: 条件搜索_按用户ID搜索
  priority: P2
  request:
    method: GET
    path: /admin/order/conditionSearch
    headers:
      token: '{{admin_token}}'
    query:
      userId: 1
      page: 1
      pageSize: 10
  assert:
    status_code: 200
    json:
      code: 1
- name: 条件搜索_多条件组合搜索
  priority: P1
  request:
    method: GET
    path: /admin/order/conditionSearch
    headers:
      token: '{{admin_token}}'
    query:
      phone: '13800138000'
      status: 2
      beginTime: '2024-01-01 00:00:00'
      endTime: '2024-12-31 23:59:59'
      page: 1
      pageSize: 10
  assert:
    status_code: 200
    json:
      code: 1
- name: 条件搜索_未登录
  priority: P1
  request:
    method: GET
    path: /admin/order/conditionSearch
    headers: {}
    query:
      page: 1
      pageSize: 10
  assert:
    status_code: 401
- name: 条件搜索_分页边界_pageSize为0
  priority: P2
  request:
    method: GET
    path: /admin/order/conditionSearch
    headers:
      token: '{{admin_token}}'
    query:
      page: 1
      pageSize: 0
  assert:
    status_code: 200
    json:
      code: 0
- name: 订单详情_正常流程
