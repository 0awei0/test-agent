suite: 订单处理与支付模块
base_url: '{{base_url}}'
cases:
- name: 提交订单_正常流程
  priority: P0
  request:
    method: POST
    path: /user/order/submit
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
    body:
      addressBookId: 1
      amount: 3800
      deliveryStatus: 0
      estimatedDeliveryTime: '2025-12-31 12:00:00'
      packAmount: 0
      payMethod: 1
      remark: 少放辣
      tablewareNumber: 2
      tablewareStatus: 0
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM orders ORDER BY id DESC LIMIT 1
    expect_not_empty: true
- name: 提交订单_未登录
  priority: P0
  request:
    method: POST
    path: /user/order/submit
    headers:
      Content-Type: application/json
    body:
      addressBookId: 1
      amount: 3800
      deliveryStatus: 0
      estimatedDeliveryTime: '2025-12-31 12:00:00'
      packAmount: 0
      payMethod: 1
      remark: ''
      tablewareNumber: 2
      tablewareStatus: 0
  assert:
    status_code: 401
- name: 提交订单_地址为空
  priority: P1
  request:
    method: POST
    path: /user/order/submit
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
    body:
      addressBookId: null
      amount: 3800
      deliveryStatus: 0
      estimatedDeliveryTime: '2025-12-31 12:00:00'
      packAmount: 0
      payMethod: 1
      remark: ''
      tablewareNumber: 2
      tablewareStatus: 0
  assert:
    status_code: 200
    json:
      code: 0
- name: 订单支付_正常流程
  priority: P0
  request:
    method: PUT
    path: /user/order/payment
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
    body:
      orderNumber: '{{order_number}}'
      payMethod: 1
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM orders WHERE order_number = '{{order_number}}' AND pay_status
      = 1
    expect_not_empty: true
- name: 订单支付_订单号不存在
  priority: P1
  request:
    method: PUT
    path: /user/order/payment
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
    body:
      orderNumber: NOT_EXIST_99999
      payMethod: 1
  assert:
    status_code: 200
    json:
      code: 0
- name: 订单支付_未登录
  priority: P1
  request:
    method: PUT
    path: /user/order/payment
    headers:
      Content-Type: application/json
    body:
      orderNumber: '{{order_number}}'
      payMethod: 1
  assert:
    status_code: 401
- name: 取消订单_正常流程
  priority: P0
  request:
    method: PUT
    path: /user/order/cancel/{{pending_order_id}}
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM orders WHERE id = {{pending_order_id}} AND status = 6
    expect_not_empty: true
- name: 取消订单_订单不存在
  priority: P1
  request:
    method: PUT
    path: /user/order/cancel/999999
    headers:
      Content-Type: application/json
      authentication: '{{user_token}}'
  assert:
    status_code: 200
    json:
      code: 0
- name: 取消订单_未登录
  priority: P1
  request:
    method: PUT
    path: /user/order/cancel/{{pending_order_id}}
    headers:
      Content-Type: application/json
  assert:
    status_code: 401
- name: 历史订单_正常查询
  priority: P0
  request:
    method: GET
    path: /user/order/historyOrders?page=1&pageSize=10
    headers:
      authentication: '{{user_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 历史订单_按状态筛选
