suite: 店铺管理模块
base_url: '{{base_url}}'
cases:
- name: 获取店铺营业状态_已登录正常获取
  priority: P0
  request:
    method: GET
    path: /admin/shop/status
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
      data: '!None'
- name: 获取店铺营业状态_未登录
  priority: P1
  request:
    method: GET
    path: /admin/shop/status
  assert:
    status_code: 401
- name: 设置店铺营业状态_设置为营业
  priority: P0
  request:
    method: PUT
    path: /admin/shop/1
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT status FROM sky_shop WHERE id = 1
    expect_column_value: status
    expect_value: 1
- name: 设置店铺营业状态_设置为打烊
  priority: P0
  request:
    method: PUT
    path: /admin/shop/0
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT status FROM sky_shop WHERE id = 1
    expect_column_value: status
    expect_value: 0
- name: 设置店铺营业状态_未登录设置营业
  priority: P1
  request:
    method: PUT
    path: /admin/shop/1
  assert:
    status_code: 401
- name: 设置店铺营业状态_设置后查询验证一致性
  priority: P0
  request:
    method: PUT
    path: /admin/shop/1
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
  post_request:
  - name: 查询营业状态
    request:
      method: GET
      path: /admin/shop/status
      headers:
        token: '{{admin_token}}'
    assert:
      status_code: 200
      json:
        code: 1
        data: 1
