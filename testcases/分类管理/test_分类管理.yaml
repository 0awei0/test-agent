suite: 分类管理模块
base_url: '{{base_url}}'
cases:
- name: 新增分类_正常新增菜品分类
  priority: P0
  request:
    method: POST
    path: /admin/category
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      name: 自动化测试菜品分类
      sort: 10
      type: 1
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM category WHERE name = '自动化测试菜品分类' AND type = 1 AND is_deleted
      = 0
    expect_not_empty: true
- name: 新增分类_正常新增套餐分类
  priority: P0
  request:
    method: POST
    path: /admin/category
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      name: 自动化测试套餐分类
      sort: 20
      type: 2
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM category WHERE name = '自动化测试套餐分类' AND type = 2 AND is_deleted
      = 0
    expect_not_empty: true
- name: 新增分类_名称为空
  priority: P1
  request:
    method: POST
    path: /admin/category
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      name: ''
      sort: 10
      type: 1
  assert:
    status_code: 200
    json:
      code: 0
- name: 新增分类_未登录
  priority: P1
  request:
    method: POST
    path: /admin/category
    headers:
      Content-Type: application/json
    body:
      name: 未登录测试分类
      sort: 10
      type: 1
  assert:
    status_code: 401
- name: 修改分类_正常修改分类名称和排序
  priority: P0
  request:
    method: PUT
    path: /admin/category
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      id: '{{category_id}}'
      name: 修改后分类名称
      sort: 99
      type: 1
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM category WHERE id = {{category_id}} AND name = '修改后分类名称' AND
      sort = 99
    expect_not_empty: true
- name: 修改分类_修改分类类型为套餐分类
  priority: P0
  request:
    method: PUT
    path: /admin/category
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      id: '{{category_id}}'
      name: 修改后分类名称
      sort: 99
      type: 2
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM category WHERE id = {{category_id}} AND type = 2
    expect_not_empty: true
- name: 修改分类_名称为空
  priority: P1
  request:
    method: PUT
    path: /admin/category
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    body:
      id: '{{category_id}}'
      name: ''
      sort: 10
      type: 1
  assert:
    status_code: 200
    json:
      code: 0
- name: 修改分类_未登录
  priority: P1
  request:
    method: PUT
    path: /admin/category
    headers:
      Content-Type: application/json
    body:
      id: '{{category_id}}'
      name: 未登录修改
      sort: 10
      type: 1
  assert:
    status_code: 401
- name: 删除分类_正常删除分类
  priority: P0
  request:
    method: DELETE
    path: /admin/category
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      id: '{{category_id}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM category WHERE id = {{category_id}} AND is_deleted = 0
    expect_empty: true
- name: 删除分类_删除不存在的分类
  priority: P1
  request:
    method: DELETE
    path: /admin/category
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      id: '99999999'
  assert:
    status_code: 200
    json:
      code: 1
- name: 删除分类_不传id参数
  priority: P1
  request:
    method: DELETE
    path: /admin/category
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 0
- name: 删除分类_未登录
  priority: P1
  request:
    method: DELETE
    path: /admin/category
    headers:
      Content-Type: application/json
    params:
      id: '{{category_id}}'
  assert:
    status_code: 401
- name: 查询分类_按菜品类型查询
  priority: P0
  request:
    method: GET
    path: /admin/category/list
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      type: 1
  assert:
    status_code: 200
    json:
      code: 1
- name: 查询分类_按套餐类型查询
  priority: P0
  request:
    method: GET
    path: /admin/category/list
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      type: 2
  assert:
    status_code: 200
    json:
      code: 1
- name: 查询分类_不传类型查全部
  priority: P1
  request:
    method: GET
    path: /admin/category/list
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 查询分类_未登录
  priority: P1
  request:
    method: GET
    path: /admin/category/list
    headers:
      Content-Type: application/json
    params:
      type: 1
  assert:
    status_code: 401
- name: 分页查询_正常分页查询第一页
  priority: P0
  request:
    method: GET
    path: /admin/category/page
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      page: 1
      pageSize: 10
  assert:
    status_code: 200
    json:
      code: 1
- name: 分页查询_按名称模糊搜索
  priority: P0
  request:
    method: GET
    path: /admin/category/page
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      page: 1
      pageSize: 10
      name: 测试
  assert:
    status_code: 200
    json:
      code: 1
- name: 分页查询_按类型筛选菜品分类
  priority: P0
  request:
    method: GET
    path: /admin/category/page
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      page: 1
      pageSize: 10
      type: 1
  assert:
    status_code: 200
    json:
      code: 1
- name: 分页查询_组合条件查询
  priority: P1
  request:
    method: GET
    path: /admin/category/page
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      page: 1
      pageSize: 5
      name: 测试
      type: 1
  assert:
    status_code: 200
    json:
      code: 1
- name: 分页查询_未登录
  priority: P1
  request:
    method: GET
    path: /admin/category/page
    headers:
      Content-Type: application/json
    params:
      page: 1
      pageSize: 10
  assert:
    status_code: 401
- name: 启用分类_正常启用
  priority: P0
  request:
    method: POST
    path: /admin/category/status/1
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      id: '{{category_id}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM category WHERE id = {{category_id}} AND status = 1
    expect_not_empty: true
- name: 禁用分类_正常禁用
  priority: P0
  request:
    method: POST
    path: /admin/category/status/0
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
    params:
      id: '{{category_id}}'
  assert:
    status_code: 200
    json:
      code: 1
  db_check:
  - sql: SELECT * FROM category WHERE id = {{category_id}} AND status = 0
    expect_not_empty: true
- name: 启用禁用分类_不传id
  priority: P1
  request:
    method: POST
    path: /admin/category/status/1
    headers:
      Content-Type: application/json
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 0
- name: 启用禁用分类_未登录
  priority: P1
  request:
    method: POST
    path: /admin/category/status/1
    headers:
      Content-Type: application/json
    params:
      id: '{{category_id}}'
  assert:
    status_code: 401
