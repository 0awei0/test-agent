suite: 报表与工作台模块
base_url: "{{base_url}}"
cases:
  - name: 正常获取订单统计数据
    priority: P0
    marker: smoke
    request:
      method: GET
      path: /admin/report/ordersStatistics
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
    assert:
      status_code: 200
      json:
        code: 1

  - name: 无效token访问订单统计
    priority: P1
    marker: regression
    request:
      method: GET
      path: /admin/report/ordersStatistics
      headers:
        Content-Type: application/json
        token: "invalid_token"
    assert:
      status_code: 401
      json:
        code: 0

  - name: 无权限访问订单统计
    priority: P1
    marker: regression
    request:
      method: GET
      path: /admin/report/ordersStatistics
      headers:
        Content-Type: application/json
        token: "{{user_token}}"
    assert:
      status_code: 403
      json:
        code: 0

