suite: 报表与工作台模块
base_url: '{{base_url}}'
cases:
- name: 营业额统计_指定日期范围_正常流程
  priority: P0
  request:
    method: GET
    path: /admin/report/turnoverStatistics
    headers:
      token: '{{admin_token}}'
    query:
      begin: '2024-01-01'
      end: '2024-12-31'
  assert:
    status_code: 200
    json:
      code: 1
- name: 营业额统计_不传日期_查全部
  priority: P0
  request:
    method: GET
    path: /admin/report/turnoverStatistics
    headers:
      token: '{{admin_token}}'
  assert:
    status_code: 200
    json:
      code: 1
- name: 营业额统计_未登录
  priority: P1
  request:
    method: GET
    path: /admin/report/turnoverStatistics
  assert:
    status_code: 401
