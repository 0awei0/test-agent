suite: 员工管理模块
base_url: "{{base_url}}"
cases:
  # ============ 员工登录 ============
  - name: 员工登录_正常流程
    priority: P0
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: admin
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 1

  - name: 员工登录_密码错误
    priority: P1
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: admin
        password: "wrong_password"
    assert:
      status_code: 200
      json:
        code: 0

  - name: 员工登录_用户名不存在
    priority: P1
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: nonexistent_user
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0

  # BUG用例：登录接口缺少用户名非空校验，后端应返回code=0，实际返回code=1
  - name: 员工登录_用户名为空
    priority: P1
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: ""
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0

  # ============ 员工退出 ============
  - name: 员工退出_正常流程
    priority: P0
    request:
      method: POST
      path: /admin/employee/logout
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
    assert:
      status_code: 200
      json:
        code: 1

  # BUG用例：未登录时接口返回非标准格式，无code字段，应返回401
  - name: 员工退出_未登录
    priority: P1
    request:
      method: POST
      path: /admin/employee/logout
      headers:
        Content-Type: application/json
    assert:
      status_code: 401

  # ============ 新增员工 ============
  - name: 新增员工_正常流程
    priority: P0
    request:
      method: POST
      path: /admin/employee
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
      body:
        name: "测试员工"
        username: "test_employee_001"
        phone: "13800138000"
        sex: "1"
        idNumber: "110101199001011234"
    assert:
      status_code: 200
      json:
        code: 1
    db_check:
      - sql: "SELECT * FROM employee WHERE username = 'test_employee_001' AND status = 1"
        expect_not_empty: true

  - name: 新增员工_姓名为空
    priority: P1
    request:
      method: POST
      path: /admin/employee
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
      body:
        name: ""
        username: "test_no_name"
        phone: "13800138001"
        sex: "1"
        idNumber: "110101199001011235"
    assert:
      status_code: 200
      json:
        code: 0

  - name: 新增员工_用户名为空
    priority: P1
    request:
      method: POST
      path: /admin/employee
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
      body:
        name: "李四"
        username: ""
        phone: "13800138002"
        sex: "1"
        idNumber: "110101199001011236"
    assert:
      status_code: 200
      json:
        code: 0

  # BUG用例：未登录时接口返回非标准格式，无code字段，应返回401
  - name: 新增员工_未登录
    priority: P1
    request:
      method: POST
      path: /admin/employee
      headers:
        Content-Type: application/json
      body:
        name: "王五"
        username: "wangwu"
        phone: "13800138003"
        sex: "1"
        idNumber: "110101199001011237"
    assert:
      status_code: 401

  # ============ 编辑员工信息 ============
  - name: 编辑员工_正常流程
    priority: P0
    request:
      method: PUT
      path: /admin/employee
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
      body:
        id: 1
        name: "管理员_已修改"
        username: "admin"
        phone: "13900139000"
        sex: "1"
        idNumber: "110101199001011234"
    assert:
      status_code: 200
      json:
        code: 1
    db_check:
      - sql: "SELECT * FROM employee WHERE id = 1 AND status = 1"
        expect_not_empty: true

  # BUG用例：未登录时接口返回非标准格式，无code字段，应返回401
  - name: 编辑员工_未登录
    priority: P1
    request:
      method: PUT
      path: /admin/employee
      headers:
        Content-Type: application/json
      body:
        id: 1
        name: "张三_修改"
        username: "admin"
        phone: "13900139000"
        sex: "1"
        idNumber: "110101199001011234"
    assert:
      status_code: 401

  # ============ 员工分页查询 ============
  - name: 员工分页查询_正常流程
    priority: P0
    request:
      method: GET
      path: /admin/employee/page
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
      params:
        page: 1
        pageSize: 10
    assert:
      status_code: 200
      json:
        code: 1

  - name: 员工分页查询_按名称搜索
    priority: P0
    request:
      method: GET
      path: /admin/employee/page
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
      params:
        page: 1
        pageSize: 10
        name: "管理"
    assert:
      status_code: 200
      json:
        code: 1

  # BUG用例：未登录时接口返回非标准格式，无code字段，应返回401
  - name: 员工分页查询_未登录
    priority: P1
    request:
      method: GET
      path: /admin/employee/page
      headers:
        Content-Type: application/json
      params:
        page: 1
        pageSize: 10
    assert:
      status_code: 401

  # ============ 启用禁用员工账号 ============
  - name: 启用禁用员工_正常流程
    priority: P0
    request:
      method: POST
      path: /admin/employee/status/1
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
      params:
        id: 1
    assert:
      status_code: 200
      json:
        code: 1
    db_check:
      - sql: "SELECT * FROM employee WHERE id = 1 AND status = 1"
        expect_not_empty: true

  - name: 启用禁用员工_禁用账号
    priority: P0
    request:
      method: POST
      path: /admin/employee/status/0
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
      params:
        id: 1
    assert:
      status_code: 200
      json:
        code: 1
    db_check:
      - sql: "SELECT * FROM employee WHERE id = 1 AND status = 0"
        expect_not_empty: true

  # BUG用例：未登录时接口返回非标准格式，无code字段，应返回401
  - name: 启用禁用员工_未登录
    priority: P1
    request:
      method: POST
      path: /admin/employee/status/1
      headers:
        Content-Type: application/json
      params:
        id: 1
    assert:
      status_code: 401

  # ============ 根据id查询员工 ============
  - name: 根据id查询员工_正常流程
    priority: P0
    request:
      method: GET
      path: /admin/employee/1
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
    assert:
      status_code: 200
      json:
        code: 1

  # BUG用例：未登录时接口返回非标准格式，无code字段，应返回401
  - name: 根据id查询员工_未登录
    priority: P1
    request:
      method: GET
      path: /admin/employee/1
      headers:
        Content-Type: application/json
    assert:
      status_code: 401