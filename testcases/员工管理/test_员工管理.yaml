suite: 员工管理模块
base_url: "{{base_url}}"
cases:
  # P0 - 正常流程
  - name: 员工登录_正常流程_正确用户名密码
    priority: P0
    marker: smoke
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 1
    db_check:
      - sql: "SELECT * FROM employee WHERE username = 'admin' AND status = 1"
        expect_not_empty: true

  # P1 - 参数校验：每个必填参数为空
  - name: 员工登录_用户名为空
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: ""
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户名不能为空"

  - name: 员工登录_密码为空
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: ""
    assert:
      status_code: 200
      json:
        code: 0
        msg: "密码不能为空"

  - name: 员工登录_用户名和密码都为空
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: ""
        password: ""
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户名不能为空"

  # P1 - 参数类型错误
  - name: 员工登录_用户名类型错误_数字
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: 123456
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户名不能为空"

  - name: 员工登录_密码类型错误_数字
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: 123456
    assert:
      status_code: 200
      json:
        code: 0
        msg: "密码不能为空"

  # P1 - 参数值非法
  - name: 员工登录_用户名不存在
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "nonexistent_user"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户不存在"

  - name: 员工登录_密码错误
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: "wrong_password"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "密码错误"

  # P1 - 参数超长
  - name: 员工登录_用户名超长
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "a_very_long_username_that_exceeds_the_database_field_length_limit_for_username_column"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户名不存在"

  - name: 员工登录_密码超长
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: "a_very_long_password_that_exceeds_the_database_field_length_limit_for_password_column"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "密码错误"

  # P1 - 权限校验：登录接口本身无需token，但可测试已登录状态重复登录
  - name: 员工登录_重复登录_已有有效token
    priority: P1
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
        token: "{{admin_token}}"
      body:
        username: "admin"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 1

  # P2 - 边界值
  - name: 员工登录_空请求体
    priority: P2
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body: {}
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户名不能为空"

  - name: 员工登录_请求体为null
    priority: P2
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body: null
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户名不能为空"

  - name: 员工登录_用户名最小长度
    priority: P2
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "a"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户不存在"

  - name: 员工登录_密码最小长度
    priority: P2
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: "1"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "密码错误"

  - name: 员工登录_账号被禁用
    priority: P2
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "disabled_employee"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "账号已被禁用"
    db_check:
      - sql: "SELECT * FROM employee WHERE username = 'disabled_employee' AND status = 0"
        expect_not_empty: true

  # P2 - 关联数据：不存在的用户
  - name: 员工登录_用户不存在
    priority: P2
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "nonexistent_employee_12345"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户不存在"

  # P3 - 业务逻辑：特殊字符
  - name: 员工登录_用户名含特殊字符
    priority: P3
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin' OR '1'='1"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户不存在"

  - name: 员工登录_密码含特殊字符
    priority: P3
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: "123' OR '1'='1"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "密码错误"

  - name: 员工登录_用户名含空格
    priority: P3
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: " admin "
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户不存在"

  - name: 员工登录_密码含空格
    priority: P3
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: " 123456 "
    assert:
      status_code: 200
      json:
        code: 0
        msg: "密码错误"

  # P3 - 业务逻辑：大小写敏感性
  - name: 员工登录_用户名大小写敏感
    priority: P3
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "ADMIN"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "用户不存在"

  - name: 员工登录_密码大小写敏感
    priority: P3
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: "123456ABC"
    assert:
      status_code: 200
      json:
        code: 0
        msg: "密码错误"

  # P3 - 业务逻辑：登录后返回数据验证
  - name: 员工登录_返回数据验证
    priority: P3
    marker: regression
    request:
      method: POST
      path: /admin/employee/login
      headers:
        Content-Type: application/json
      body:
        username: "admin"
        password: "123456"
    assert:
      status_code: 200
      json:
        code: 1
        data:
          token: "{{check_not_null}}"
          name: "{{check_not_null}}"
          id: "{{check_not_null}}"